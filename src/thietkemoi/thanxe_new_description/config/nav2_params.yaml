# ==========================================================
# NAV2 PARAMS CHUẨN CHO ROBOT DIFF DRIVE 150KG
# ==========================================================

amcl:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_footprint"   # frame robot
    global_frame_id: "map"            # frame bản đồ
    odom_frame_id: "odom"             # frame odometry
    scan_topic: "/scan"               # topic lidar

    min_particles: 500
    max_particles: 2000

    laser_max_range: 40.0
    laser_min_range: 0.05

    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    transform_tolerance: 1.0


# ==========================================================
# CONTROLLER
# ==========================================================

controller_server:
  ros__parameters:

    use_sim_time: True

    controller_frequency: 20.0

    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.3

    controller_plugins: ["FollowPath"]

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]

    # -------------------------
    # GOAL CHECKER
    # -------------------------

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25     # sai số vị trí goal
      yaw_goal_tolerance: 0.25    # sai số góc
      stateful: True

    # -------------------------
    # PROGRESS CHECKER
    # -------------------------

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3   # robot phải tiến ít nhất 0.3m
      movement_time_allowance: 10.0   # trong 10s

    # ======================================================
    # DWB LOCAL PLANNER
    # ======================================================

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      # ---------- velocity ----------

      min_vel_x: 0.0
      max_vel_x: 0.4

      min_vel_y: 0.0
      max_vel_y: 0.0

      max_vel_theta: 1.2

      min_speed_xy: 0.0
      max_speed_xy: 0.4

      min_speed_theta: 0.0

      acc_lim_x: 1.5
      acc_lim_theta: 2.0

      decel_lim_x: -1.5
      decel_lim_theta: -2.0

      # ---------- sampling ----------

      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20

      sim_time: 2.0

      # ---------- stopping ----------

      trans_stopped_velocity: 0.1

      # ---------- critics ----------

      critics: [
        "RotateToGoal",
        "ObstacleFootprint",
        "GoalAlign",
        "PathAlign",
        "PathDist",
        "GoalDist"
      ]

      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0

      PathDist.scale: 32.0
      GoalDist.scale: 24.0

      ObstacleFootprint.scale: 0.02

      RotateToGoal.scale: 32.0


# ==========================================================
# LOCAL COSTMAP
# ==========================================================

local_costmap:
  local_costmap:
    ros__parameters:

      use_sim_time: True

      global_frame: odom
      robot_base_frame: base_footprint

      update_frequency: 10.0
      publish_frequency: 5.0

      rolling_window: true

      width: 6        # vùng local map 6m
      height: 6
      resolution: 0.05

      footprint: "[[0.9,0.425],[0.9,-0.425],[-0.9,-0.425],[-0.9,0.425]]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_range: 5.0
          raytrace_range: 6.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.7 # Vùng an toàn để né
        cost_scaling_factor: 3.0


# ==========================================================
# GLOBAL COSTMAP
# ==========================================================

global_costmap:
  global_costmap:
    ros__parameters:

      use_sim_time: True

      global_frame: map
      robot_base_frame: base_footprint

      update_frequency: 5.0
      publish_frequency: 2.0

      footprint: "[[0.9,0.425],[0.9,-0.425],[-0.9,-0.425],[-0.9,0.425]]"

      resolution: 0.05

      plugins: ["static_layer","obstacle_layer","inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.7
        cost_scaling_factor: 3.0


# ==========================================================
# PLANNER
# ==========================================================

planner_server:
  ros__parameters:

    use_sim_time: True

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true


# ==========================================================
# BEHAVIOR
# ==========================================================

behavior_server:
  ros__parameters:

    use_sim_time: True

    behavior_plugins:
      - spin
      - backup
      - drive_on_heading
      - wait

    spin:
      plugin: "nav2_behaviors/Spin"

    backup:
      plugin: "nav2_behaviors/BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"

    wait:
      plugin: "nav2_behaviors/Wait"


# ==========================================================
# MAP SERVER
# ==========================================================

map_server:
  ros__parameters:

    use_sim_time: True

    yaml_filename: "/home/loc/new_design_ws/src/thietkemoi/thanxe_new_description/maps/my_vinfast_map.yaml"